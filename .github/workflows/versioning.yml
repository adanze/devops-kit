name: Semantic Versioning

on:
  workflow_call:
    outputs:
      version:
        description: MajorMinorPatch version (e.g. 1.2.3)
        value: ${{ jobs.versioning.outputs.version }}
      semver:
        description: Full SemVer version (e.g. 1.2.3-alpha.4)
        value: ${{ jobs.versioning.outputs.semver }}

jobs:
  versioning:
    name: SemVer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout devops-kit with GitVersion config
        uses: actions/checkout@v6.0.2
        with:
          repository: adanze/devops-kit
          path: .devops-config

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: "6.x.x"

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0
        with:
          configFilePath: .devops-config/GitVersion.yaml

      - name: Display Version
        run: |
          echo "SemVer: ${{ steps.gitversion.outputs.semVer }}"
          echo "MajorMinorPatch: ${{ steps.gitversion.outputs.majorMinorPatch }}"

    outputs:
      version: ${{ steps.gitversion.outputs.majorMinorPatch }}
      semver: ${{ steps.gitversion.outputs.semVer }}
